# ========================
# PostgreSQL Database Configuration
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/campusinfrastructure}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate Settings
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Server Configuration
# ========================
server.port=8081

# ========================
# Multipart Configuration
# ========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Optional: Location to store temporary uploaded files
# spring.servlet.multipart.location=/tmp

# ========================
# Twilio SMS Configuration
# ========================
twilio.enabled=${TWILIO_ENABLED:true}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}
twilio.admin-phone-number=${TWILIO_ADMIN_PHONE_NUMBER:}
twilio.validate-signature=false
twilio.webhook-url=${TWILIO_WEBHOOK_URL:}
