# ========================
# Database Configuration (Smart Routing)
# Uses Environment Variables if deployed (Render/PostgreSQL), falls back to local MySQL for dev
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/campusinfrastructure}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345678}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# ========================
# JPA / Hibernate Settings
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Server Configuration
# ========================
server.port=${PORT:8081}

# ========================
# CORS Configuration
# ========================
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,https://*.vercel.app}

# ========================
# Multipart Configuration
# ========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Optional: Location to store temporary uploaded files
# spring.servlet.multipart.location=/tmp

# ========================
# Twilio SMS Configuration (Smart Routing)
# ========================
twilio.enabled=${TWILIO_ENABLED:false}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}
twilio.admin-phone-number=${TWILIO_ADMIN_PHONE_NUMBER:}
twilio.validate-signature=false
twilio.webhook-url=${TWILIO_WEBHOOK_URL:}
